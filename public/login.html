<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLSyncBridge — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1a1d27',
            base: '#0f1117',
            accent: '#3b82f6',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f1117; color: #e2e8f0; font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md px-4">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-accent mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-white">KLSyncBridge</h1>
      <p class="text-slate-400 text-sm mt-1">Integración de datos</p>
    </div>

    <div class="bg-surface rounded-2xl p-8 shadow-2xl border border-white/5">
      <h2 class="text-lg font-medium text-white mb-6">Iniciar sesión</h2>

      <div id="error-msg" class="hidden mb-4 p-3 rounded-lg bg-red-900/40 border border-red-500/30 text-red-300 text-sm"></div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Usuario</label>
          <input
            id="username"
            type="text"
            autocomplete="username"
            required
            class="w-full px-4 py-2.5 rounded-lg bg-base border border-white/10 text-white placeholder-slate-500 font-mono text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors"
            placeholder="admin"
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Contraseña</label>
          <input
            id="password"
            type="password"
            autocomplete="current-password"
            required
            class="w-full px-4 py-2.5 rounded-lg bg-base border border-white/10 text-white placeholder-slate-500 font-mono text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors"
            placeholder="••••••••"
          >
        </div>
        <button
          type="submit"
          id="submit-btn"
          class="w-full py-2.5 px-4 bg-accent hover:bg-blue-500 text-white font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-surface disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Iniciar sesión
        </button>
      </form>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">KLSyncBridge v1.0.0</p>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    // Redirigir si ya tiene sesión
    if (localStorage.getItem('sb_token')) {
      window.location.href = '/dashboard';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      errorMsg.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.ok) {
          localStorage.setItem('sb_token', data.data.token);
          localStorage.setItem('sb_user', JSON.stringify(data.data.user));
          window.location.href = '/dashboard';
        } else {
          errorMsg.textContent = data.error || 'Error al iniciar sesión';
          errorMsg.classList.remove('hidden');
        }
      } catch (err) {
        errorMsg.textContent = 'Error de conexión con el servidor';
        errorMsg.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
